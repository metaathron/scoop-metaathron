name: Sync My Apps

on:
  schedule:
    - cron: '0 4 * * *' # Spustí se každý den ve 4:00 ráno
  workflow_dispatch: # Tlačítko pro ruční spuštění

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync manifests from apps.txt
        run: |
          # Vytvoří složku bucket, pokud neexistuje
          mkdir -p bucket

          # Smaže staré manifesty v bucketu
          rm -f bucket/*.json

          while IFS= read -r line || [ -n "$line" ]; do
            url=$(echo "$line" | tr -d '\r' | xargs)
            [[ -z "$url" || "$url" =~ ^# ]] && continue
            
            # --- AUTOMATICKÝ PŘEVOD NA RAW ODKAZ ---
            # Pokud odkaz obsahuje github.com/.../blob/, převede ho na raw.githubusercontent.com
            if [[ "$url" =~ github.com/([^/]+)/([^/]+)/blob/(.+) ]]; then
              user="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              rest="${BASH_REMATCH[3]}"
              url="https://raw.githubusercontent.com/${user}/${repo}/${rest}"
            fi
            # ---------------------------------------

            filename=$(basename "$url")
            echo "Stahuji: $filename z adresy $url..."
            
            if curl -fsL "$url" -o "bucket/$filename"; then
              echo "✓ Úspěšně staženo: $filename"
            else
              echo "❌ Chyba při stahování URL: $url"
              exit 1
            fi
          done < apps.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/
          # Commitne změny pouze v případě, že se v aplikacích objevila nová verze nebo se změnil seznam
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: Synchronizace aplikací podle apps.txt" && git push)
