name: Sync My Apps

on:
  schedule:
    - cron: '0 4 * * *' # Spustí se každý den ve 4:00 ráno
  workflow_dispatch: # Tlačítko pro ruční spuštění

# KLÍČOVÉ: Povolí GitHub Actions zapisovat (pushovat) změny do vašeho repozitáře
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync manifests from apps.txt
        run: |
          mkdir -p bucket
          rm -f bucket/*.json

          # Kontrola, zda apps.txt vůbec existuje
          if [ ! -f apps.txt ]; then
            echo "❌ Soubor apps.txt nebyl nalezen!"
            exit 1
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            # Odstranění přebytečných mezer a konců řádků z Windows (\r)
            url=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            # Přeskočit prázdné řádky a komentáře
            [[ -z "$url" || "$url" =~ ^# ]] && continue
            
            # Převod klasického GitHub odkazu na RAW verzi
            if [[ "$url" =~ github.com/([^/]+)/([^/]+)/blob/(.+) ]]; then
              user="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              rest="${BASH_REMATCH[3]}"
              url="https://raw.githubusercontent.com/${user}/${repo}/${rest}"
            fi

            filename=$(basename "$url")
            
            # Bezpečnostní kontrola, zda URL neobsahuje neplatné znaky
            if [[ ! "$url" =~ ^https?:// ]]; then
              echo "❌ Neplatný formát URL přeskočen: '$url'"
              continue
            fi

            echo "Stahuji: $filename z adresy: $url"
            
            if curl -fsL "$url" -o "bucket/$filename"; then
              echo "✓ Úspěšně staženo"
            else
              echo "❌ Selhalo stahování URL: $url (Exit code curl: $?)"
              exit 1
            fi
          done < apps.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/
          
          # Pushne změny pouze pokud se reálně něco změnilo
          if ! git diff --cached --quiet; then
            git commit -m "Update: Synchronizace aplikací podle apps.txt"
            git push
          else
            echo "Žádné změny k uložení."
          fi